<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WTYT · Saved notes</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }
    header { margin-bottom: 28px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--wtyt-ink-2); font-size: 14px; margin: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .note-card {
      border: 1px solid var(--wtyt-border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--wtyt-surface);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
    }
    .note-card:hover { border-color: var(--wtyt-ink-2); transform: translateY(-2px); }
    .note-thumb { position: relative; aspect-ratio: 16 / 9; background: var(--wtyt-layer); }
    .note-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .note-pill {
      position: absolute; top: 8px; left: 8px;
      display: inline-flex; align-items: center; gap: 5px;
      font-weight: 700; font-size: 11px; letter-spacing: 0.05em;
      padding: 3px 9px 3px 7px; border-radius: 999px; color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .note-del {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border: none; border-radius: 50%;
      background: rgba(20,20,20,0.7); color: #fff; cursor: pointer;
      opacity: 0; transition: opacity 0.15s;
    }
    .note-card:hover .note-del { opacity: 1; }
    .note-del:hover { background: var(--wtyt-bad); }
    .note-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }
    .note-title {
      font-size: 14.5px; font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-oneliner {
      font-size: 12.5px; color: var(--wtyt-ink-2); margin-top: 6px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-meta {
      display: flex; justify-content: space-between; gap: 8px;
      margin-top: auto; padding-top: 10px;
      font-size: 11.5px; color: var(--wtyt-ink-2);
    }
    .note-channel { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-date { flex-shrink: 0; }

    .empty { text-align: center; color: var(--wtyt-ink-2); padding: 80px 20px; }
    .empty h2 { font-size: 17px; color: var(--wtyt-ink); margin: 0 0 8px; }
    .empty p { margin: 0; font-size: 14px; }

    /* Verdict pill colors mirror the reader/cards palette. */
    .v-watch { background: #249236; } .v-read { background: #3170c7; }
    .v-listen { background: #7c4dff; } .v-skip { background: #7d7d7d; }
  </style>
</head>
<body>
  <header>
    <h1>Saved notes</h1>
    <p class="sub">Videos you saved with the WTYT Save button. Tap any card to open its reader view.</p>
  </header>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <h2>No saved notes yet</h2>
    <p>On a video or playlist, hit <strong>Save</strong> on a WTYT card to keep it here.</p>
  </div>

  <script src="metrics.js"></script>
  <script src="icons.js"></script>
  <script src="reader.js"></script>
  <script src="notes-store.js"></script>
  <script src="notes.js"></script>
</body>
</html>
